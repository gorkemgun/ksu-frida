name: CI-Build
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Module
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
      - uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4.2.1
        with:
          distribution: temurin
          java-version: 11
          cache: gradle
      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew :module:assembleRelease
      - name: Get Module Info
        id: module-version
        run: |
          MODULE_VERSION=$(grep 'moduleVersion =' module.gradle | awk -F'"' '{print $2}')
          MODULE_VERSION_CODE=$(grep 'moduleVersionCode =' module.gradle | awk -F'= ' '{print $2}')
          echo "version=$MODULE_VERSION" >> "$GITHUB_OUTPUT"
          echo "versionCode=$MODULE_VERSION_CODE" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: KsuFrida-${{ steps.module-version.outputs.version }}-release
          path: out/magisk_module_zygisk_release
      - name: Create Release ZIP
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd out
          zip -r KsuFrida-${{ steps.module-version.outputs.version }}.zip magisk_module_zygisk_release/
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: KsuFrida ${{ steps.module-version.outputs.version }}
          generate_release_notes: true
          files: out/KsuFrida-${{ steps.module-version.outputs.version }}.zip
      - name: Update update.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${{ steps.module-version.outputs.version }}
          VERSION_CODE=${{ steps.module-version.outputs.versionCode }}
          printf '{\n    "version": "%s",\n    "versionCode": %s,\n    "zipUrl": "https://github.com/gorkemgun/ksu-frida/releases/download/%s/KsuFrida-%s.zip",\n    "changelog": "https://github.com/gorkemgun/ksu-frida/releases/tag/%s"\n}\n' "$VERSION" "$VERSION_CODE" "$VERSION" "$VERSION" "$VERSION" > update.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add update.json
          git commit -m "update update.json for ${VERSION}"
          git push
