<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KsuFrida</title>
    <style>
        :root {
            --primary: #2196F3;
            --danger: #f44336;
            --success: #4CAF50;
            --bg: #121212;
            --surface: #1e1e1e;
            --surface2: #2a2a2a;
            --text: #e0e0e0;
            --text2: #999;
            --border: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 600px; }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 22px; }
        .header p { color: var(--text2); font-size: 13px; margin-top: 4px; }

        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .card-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-title h3 { font-size: 15px; }

        .target {
            background: var(--surface2);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .target:last-child { margin-bottom: 0; }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .row-gap { gap: 8px; }

        .field { margin-top: 10px; }
        .field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }

        .btn {
            border: none;
            border-radius: 6px;
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            color: white;
            background: var(--border);
        }

        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
        }

        textarea { resize: vertical; min-height: 50px; }

        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #555;
            border-radius: 20px;
            transition: .3s;
        }

        .slider:before {
            content: "";
            position: absolute;
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: .3s;
        }

        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(16px); }

        .child-panel {
            background: var(--bg);
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px dashed var(--border);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--surface);
            width: 90%;
            max-width: 480px;
            max-height: 75vh;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .modal-body {
            overflow-y: auto;
            flex: 1;
            margin-top: 10px;
        }

        .app-row {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 13px;
        }

        .app-row:hover { background: var(--surface2); }
        .app-row .app-label { font-size: 12px; color: var(--text2); }

        .empty { color: var(--text2); text-align: center; padding: 24px 0; font-size: 13px; }

        .status-ok { color: var(--success); }
        .status-err { color: var(--danger); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>KsuFrida</h1>
            <p>Frida Gadget Injection Manager</p>
        </div>

        <div class="card">
            <div class="card-title">
                <h3>Targets</h3>
                <button class="btn btn-primary btn-sm" id="btn-add">+ Add</button>
            </div>
            <div id="targets"></div>
        </div>

        <div class="card">
            <div class="card-title">
                <h3>Gadget Config</h3>
                <span id="gadget-status"></span>
            </div>
            <textarea id="gadget-editor" rows="4" placeholder="Loading..."></textarea>
            <div style="margin-top:8px;">
                <button class="btn btn-primary btn-sm" id="btn-save-gadget">Save Gadget Config</button>
            </div>
        </div>

        <div class="card">
            <div class="row">
                <button class="btn btn-success" id="btn-save">Save All</button>
                <button class="btn" id="btn-reload">Reload</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="app-modal">
        <div class="modal">
            <div class="row">
                <h3>Select App</h3>
                <button class="btn btn-sm" id="btn-close-modal">Close</button>
            </div>
            <input type="text" id="app-search" placeholder="Search packages...">
            <div class="modal-body" id="app-list"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
